 <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuzey İletişim - Teknik Servis Takip</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @media print {
            body * { visibility: hidden; }
            #prizone, #prizone * { visibility: visible; }
            #prizone { position: absolute; left: 0; top: 0; width: 58mm; }
        }
        /* Alt menünün telefon çentiğine takılmaması için alt boşluk */
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 4rem); }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased safe-bottom">

    <header class="bg-red-600 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-40">
        <h1 class="text-xl font-bold tracking-wider flex items-center">
            <i class="fa-solid fa-mobile-screen-button mr-2"></i>KUZEY İLETİŞİM
        </h1>
        <span id="pageTitle" class="text-xs bg-white text-red-600 px-2.5 py-1 rounded-full font-bold shadow-sm">Yeni Kayıt</span>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <section id="tab-new-record" class="space-y-4 tab-content">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center border-b pb-2 border-gray-100">
                    <i class="fa-solid fa-square-plus text-red-600 mr-2"></i>Müşteri ve Cihaz Girişi
                </h2>
                <form id="recordForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Müşteri Adı Soyadı</label>
                        <input type="text" id="customerName" required class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Telefon Numarası</label>
                        <input type="tel" id="customerPhone" placeholder="05xx xxx xx xx" required class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Cihaz Model / Marka</label>
                        <input type="text" id="deviceModel" placeholder="Örn: iPhone 14 Pro" required class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Bildirilen Arıza</label>
                        <textarea id="deviceFault" rows="2" required class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-500 outline-none transition"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Fiyat (TL)</label>
                            <input type="number" id="price" placeholder="0" class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Giriş Zamanı</label>
                            <input type="datetime-local" id="entryDate" required class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 font-mono text-sm outline-none">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-red-100 transition flex justify-center items-center tracking-wider">
                        <i class="fa-solid fa-print mr-2"></i>KAYDET VE FİŞ ÜRET
                    </button>
                </form>
            </div>
        </section>

        <section id="tab-records-list" class="space-y-4 tab-content hidden">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" id="searchRecords" placeholder="Cihaz, arıza veya ID ile ara..." class="w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-xl shadow-sm outline-none focus:border-red-500">
            </div>
            
            <div id="recordsListContainer" class="space-y-3">
                </div>
        </section>

        <section id="tab-customers-list" class="space-y-4 tab-content hidden">
            <div class="relative">
                <i class="fa-solid fa-user-gear absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" id="searchCustomers" placeholder="Müşteri ismi veya telefon yazın..." class="w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-xl shadow-sm outline-none focus:border-red-500">
            </div>

            <div id="customersListContainer" class="space-y-2">
                </div>
        </section>

    </main>

    <div id="printModal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-5 shadow-2xl space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <span class="font-bold text-gray-800">Servis Alındı Fişi</span>
                <button onclick="closePrintModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            
            <div id="prizone" class="bg-white p-2 font-mono text-xs text-black space-y-3 mx-auto" style="width: 58mm;">
                <div class="text-center border-b pb-2 border-black border-dashed">
                    <p class="font-bold text-sm">KUZEY İLETİŞİM</p>
                    <p class="text-[10px]">Teknik Servis Alındı Belgesi</p>
                </div>
                <div class="space-y-1 text-[11px]">
                    <p><strong>Tarih:</strong> <span id="fTarih"></span></p>
                    <p><strong>Fiş No:</strong> <span id="fNo"></span></p>
                    <hr class="border-black border-dashed my-1">
                    <p><strong>Müşteri:</strong> <span id="fMusteri"></span></p>
                    <p><strong>Tel:</strong> <span id="fTel"></span></p>
                    <p><strong>Cihaz:</strong> <span id="fCihaz"></span></p>
                    <p><strong>Arıza:</strong> <span id="fAriza"></span></p>
                    <hr class="border-black border-dashed my-1">
                    <p class="text-right font-bold text-xs">Tutar: <span id="fTutar"></span> TL</p>
                </div>
                <div class="text-center border-t pt-2 border-black border-dashed text-[9px] leading-tight">
                    <p>Cihaz tesliminde fiş ibrazı zorunludur.</p>
                    <p class="mt-1 font-bold">Teşekkür Ederiz!</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="closePrintModal()" class="bg-gray-200 text-gray-700 font-bold py-2.5 rounded-xl text-sm">Kapat</button>
                <button onclick="window.print()" class="bg-black text-white font-bold py-2.5 rounded-xl text-sm flex justify-center items-center">
                    <i class="fa-solid fa-print mr-2"></i>Yazdır
                </button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-5 shadow-2xl flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center border-b pb-3 mb-3">
                <div>
                    <h3 id="historyModalTitle" class="font-bold text-gray-800 text-base">Müşteri Geçmişi</h3>
                    <p id="historyModalSub" class="text-xs text-gray-500"></p>
                </div>
                <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div id="historyModalContent" class="space-y-3 overflow-y-auto pr-1 flex-1">
                </div>
            <button onclick="closeHistoryModal()" class="w-full mt-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 rounded-xl text-sm">Pencereyi Kapat</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-xl z-40">
        <div class="max-w-md mx-auto grid grid-cols-3 h-16">
            <button onclick="switchTab('new-record', 'Yeni Kayıt')" id="btn-tab-new-record" class="flex flex-col items-center justify-center text-red-600 font-bold transition">
                <i class="fa-solid fa-square-plus text-xl mb-0.5"></i>
                <span class="text-[11px]">Yeni Kayıt</span>
            </button>
            <button onclick="switchTab('records-list', 'Kayıt Listesi')" id="btn-tab-records-list" class="flex flex-col items-center justify-center text-gray-400 font-semibold transition">
                <i class="fa-solid fa-rectangle-list text-xl mb-0.5"></i>
                <span class="text-[11px]">Kayıtlar</span>
            </button>
            <button onclick="switchTab('customers-list', 'Müşteri Havuzu')" id="btn-tab-customers-list" class="flex flex-col items-center justify-center text-gray-400 font-semibold transition">
                <i class="fa-solid fa-users text-xl mb-0.5"></i>
                <span class="text-[11px]">Müşteriler</span>
            </button>
        </div>
    </nav>

    <script>
        let records = JSON.parse(localStorage.getItem('kuzey_records')) || [];

        function setNow() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('entryDate').value = now.toISOString().slice(0, 16);
        }

        // Sekme Değiştirici Fonksiyon
        function switchTab(tabId, titleText) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.getElementById('pageTitle').innerText = titleText;

            // Buton renklerini sıfırla/güncelle
            const tabs = ['new-record', 'records-list', 'customers-list'];
            tabs.forEach(t => {
                const btn = document.getElementById('btn-tab-' + t);
                if(t === tabId) {
                    btn.classList.add('text-red-600', 'font-bold');
                    btn.classList.remove('text-gray-400', 'font-semibold');
                } else {
                    btn.classList.remove('text-red-600', 'font-bold');
                    btn.classList.add('text-gray-400', 'font-semibold');
                }
            });

            if(tabId === 'records-list') renderRecords();
            if(tabId === 'customers-list') renderCustomers();
        }

        // Yeni Kayıt İşlemi
        document.getElementById('recordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newRecord = {
                id: 'KZY-' + Math.floor(100000 + Math.random() * 900000),
                name: document.getElementById('customerName').value.trim(),
                phone: document.getElementById('customerPhone').value.trim(),
                model: document.getElementById('deviceModel').value.trim(),
                fault: document.getElementById('deviceFault').value.trim(),
                price: document.getElementById('price').value || '0',
                date: document.getElementById('entryDate').value.replace('T', ' '),
                status: 'Bekliyor'
            };

            records.unshift(newRecord);
            localStorage.setItem('kuzey_records', JSON.stringify(records));
            
            this.reset();
            setNow();
            openPrintModal(newRecord);
        });

        // Kayıt Listesini Basma
        function renderRecords(filterText = '') {
            const container = document.getElementById('recordsListContainer');
            const filtered = records.filter(r => 
                r.name.toLowerCase().includes(filterText.toLowerCase()) || 
                r.model.toLowerCase().includes(filterText.toLowerCase()) ||
                r.id.toLowerCase().includes(filterText.toLowerCase())
            );

            if(filtered.length === 0) {
                container.innerHTML = `<div class="bg-white p-8 rounded-2xl text-center text-gray-400 border border-gray-200">
                    <i class="fa-solid fa-folder-open text-3xl mb-2 text-gray-300"></i><p class="text-sm">Aranan cihaz bulunamadı.</p>
                </div>`;
                return;
            }

            container.innerHTML = filtered.map(r => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 space-y-3">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-mono font-bold bg-gray-100 text-gray-600 px-2 py-0.5 rounded">${r.id}</span>
                            <h3 class="font-bold text-gray-800 mt-1">${r.name}</h3>
                            <p class="text-xs text-gray-500 font-medium">${r.model}</p>
                        </div>
                        <span class="text-xs px-2.5 py-1 rounded-full font-bold ${r.status === 'Tamamlandı' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                            ${r.status}
                        </span>
                    </div>
                    <div class="text-xs text-gray-600 bg-gray-50 p-2.5 rounded-xl border border-gray-100">
                        <strong>Arıza:</strong> ${r.fault}
                    </div>
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span><i class="fa-regular fa-clock mr-1"></i>${r.date}</span>
                        <span class="font-bold text-gray-800 text-sm">${r.price} TL</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 pt-1 border-t border-gray-100">
                        <button onclick="toggleStatus('${r.id}', 'record')" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 rounded-lg transition">Durum Değiştir</button>
                        <button onclick="openPrintModalById('${r.id}')" class="text-xs bg-red-50 text-red-600 font-bold py-2 rounded-lg transition flex justify-center items-center"><i class="fa-solid fa-print mr-1"></i> Fiş</button>
                    </div>
                </div>
            `).join('');
        }

        // Benzersiz Müşteri Listesini Oluşturma ve Filtreleme
        function renderCustomers(filterText = '') {
            const container = document.getElementById('customersListContainer');
            
            // Telefon numarasına göre müşterileri tekilleştir
            const customerMap = {};
            records.forEach(r => {
                const phoneKey = r.phone.replace(/\s+/g, '');
                if (!customerMap[phoneKey]) {
                    customerMap[phoneKey] = { name: r.name, phone: r.phone, count: 0 };
                }
                customerMap[phoneKey].count++;
            });

            const customerList = Object.values(customerMap).filter(c => 
                c.name.toLowerCase().includes(filterText.toLowerCase()) || 
                c.phone.includes(filterText)
            );

            if(customerList.length === 0) {
                container.innerHTML = `<div class="bg-white p-8 rounded-2xl text-center text-gray-400 border border-gray-200">
                    <i class="fa-solid fa-users-slash text-3xl mb-2 text-gray-300"></i><p class="text-sm">Müşteri kaydı bulunamadı.</p>
                </div>`;
                return;
            }

            container.innerHTML = customerList.map(c => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-gray-800">${c.name}</h4>
                        <p class="text-xs font-mono text-gray-500 mt-0.5"><i class="fa-solid fa-phone text-[10px] mr-1"></i>${c.phone}</p>
                    </div>
                    <button onclick="openCustomerHistory('${c.phone}')" class="text-xs bg-red-600 text-white font-bold px-3 py-2 rounded-lg shadow-sm flex items-center">
                        ${c.count} Cihaz <i class="fa-solid fa-chevron-right ml-1.5 text-[10px]"></i>
                    </button>
                </div>
            `).join('');
        }

        // Müşterinin Cihaz Geçmişini Gösteren Modal Penceresi
        function openCustomerHistory(phone) {
            const customerRecords = records.filter(r => r.phone.replace(/\s+/g, '') === phone.replace(/\s+/g, ''));
            if(customerRecords.length === 0) return;

            document.getElementById('historyModalTitle').innerText = customerRecords[0].name;
            document.getElementById('historyModalSub').innerText = customerRecords[0].phone;

            const content = document.getElementById('historyModalContent');
            content.innerHTML = customerRecords.map(r => `
                <div class="border border-gray-100 p-3 rounded-xl bg-gray-50 space-y-2 text-xs">
                    <div class="flex justify-between items-center">
                        <span class="font-mono font-bold text-gray-500 bg-white border px-1.5 py-0.5 rounded">${r.id}</span>
                        <span class="font-bold ${r.status === 'Tamamlandı' ? 'text-green-600' : 'text-amber-600'}">${r.status}</span>
                    </div>
                    <p><strong>Cihaz:</strong> ${r.model}</p>
                    <p><strong>Arıza:</strong> ${r.fault}</p>
                    <div class="flex justify-between items-center pt-1 border-t border-dashed border-gray-200 text-[11px] text-gray-500">
                        <span>${r.date}</span>
                        <span class="font-bold text-gray-800">${r.price} TL</span>
                    </div>
                    <button onclick="toggleStatus('${r.id}', 'history', '${phone}')" class="w-full mt-1 bg-white border text-[11px] font-bold py-1 rounded shadow-sm text-gray-600">Durumu Değiştir</button>
                </div>
            `).join('');

            document.getElementById('historyModal').classList.remove('hidden');
        }

        function toggleStatus(id, context, phoneRef = '') {
            records = records.map(r => {
                if(r.id === id) r.status = r.status === 'Bekliyor' ? 'Tamamlandı' : 'Bekliyor';
                return r;
            });
            localStorage.setItem('kuzey_records', JSON.stringify(records));
            
            if(context === 'record') renderRecords(document.getElementById('searchRecords').value);
            if(context === 'history') openCustomerHistory(phoneRef);
        }

        // Fiş Modalleri Kapatma Açma
        function openPrintModal(record) {
            document.getElementById('fTarih').innerText = record.date;
            document.getElementById('fNo').innerText = record.id;
            document.getElementById('fMusteri').innerText = record.name;
            document.getElementById('fTel').innerText = record.phone;
            document.getElementById('fCihaz').innerText = record.model;
            document.getElementById('fAriza').innerText = record.fault;
            document.getElementById('fTutar').innerText = record.price;
            document.getElementById('printModal').classList.remove('hidden');
        }

        function openPrintModalById(id) {
            const record = records.find(r => r.id === id);
            if(record) openPrintModal(record);
        }

        function closePrintModal() { document.getElementById('printModal').classList.add('hidden'); }
        function closeHistoryModal() { document.getElementById('historyModal').classList.add('hidden'); if(!document.getElementById('tab-customers-list').classList.contains('hidden')) renderCustomers(); }

        // Anlık Arama Tetikleyicileri
        document.getElementById('searchRecords').addEventListener('input', e => renderRecords(e.target.value));
        document.getElementById('searchCustomers').addEventListener('input', e => renderCustomers(e.target.value));

        // İlk Kurulum
        setNow();
    </script>
</body>
</html>
